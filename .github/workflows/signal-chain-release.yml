name: Signal Chain Release

on:
  push:
    tags:
      - "openshell-signal-chain/v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: openshell-signal-chain-linux-x64
          - os: macos
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact: openshell-signal-chain-macos-x64
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: openshell-signal-chain-windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure Rust
        run: |
          rustup target add "${{ matrix.target }}" 2>/dev/null || true

      - name: Build release binary
        run: |
          cargo build -p openshell-signal-chain --release --target "${{ matrix.target }}"

      - name: Stage binary
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            install "target/${{ matrix.target }}/release/openshell-signal-chain.exe" "dist/${{ matrix.artifact }}"
          else
            install "target/${{ matrix.target }}/release/openshell-signal-chain" "dist/${{ matrix.artifact }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p openshell-signal-chain
